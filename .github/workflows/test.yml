name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Install Playwright Chromium with Linux dependencies
        if: runner.os == 'Linux'
        run: pnpm exec playwright install --with-deps chromium

      - name: Install Playwright Chromium
        if: runner.os != 'Linux'
        run: pnpm exec playwright install chromium

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build
