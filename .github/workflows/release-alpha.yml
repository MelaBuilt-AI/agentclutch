name: Alpha Release Prep

on:
  workflow_dispatch:
    inputs:
      version:
        description: Alpha version to validate, for example 0.7.3-alpha.1
        required: true
        type: string
      pack_artifacts:
        description: Upload packed npm tarballs as workflow artifacts
        required: true
        type: boolean
        default: true

permissions:
  contents: read

jobs:
  release-prep:
    name: Alpha release prep (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - name: Setup pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Validate publish boundary
        run: node scripts/release-alpha.mjs check

      - name: Bump package manifests in workspace
        env:
          RELEASE_VERSION: ${{ inputs.version }}
        shell: bash
        run: node scripts/release-alpha.mjs bump --version "$RELEASE_VERSION"

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Install Playwright Chromium with Linux dependencies
        if: runner.os == 'Linux'
        run: pnpm exec playwright install --with-deps chromium

      - name: Install Playwright Chromium
        if: runner.os != 'Linux'
        run: pnpm exec playwright install chromium

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

      - name: npm publish dry-runs
        run: node scripts/release-alpha.mjs dry-run

      - name: Pack npm tarballs
        run: node scripts/release-alpha.mjs pack --destination npm-pack

      - name: Upload npm tarballs
        if: inputs.pack_artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: agentclutch-${{ inputs.version }}-${{ runner.os }}-npm-pack
          path: npm-pack/*.tgz
          if-no-files-found: error
