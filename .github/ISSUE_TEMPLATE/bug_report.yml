name: Bug report
description: Report something that is broken or surprising in AgentClutch
title: "bug: "
labels: [bug, needs-triage]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping improve AgentClutch! Please keep reports focused and remove anything sensitive from Action Cards, recorder JSONL, screenshots, and logs.

        Before filing, skim [CONTRIBUTING.md](../../CONTRIBUTING.md) and the [quickstart](../../docs/quickstart.md).
  - type: dropdown
    id: package
    attributes:
      label: Package or area
      description: Where did you see the issue?
      options:
        - "@agentclutch/core"
        - "@agentclutch/action-card"
        - "@agentclutch/loop"
        - "@agentclutch/recorder"
        - "@agentclutch/playwright"
        - "@agentclutch/react"
        - "@agentclutch/cli"
        - "docs"
        - "examples/demo"
        - "not sure"
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: AgentClutch version or commit
      description: "Example: 0.7.3-alpha.1, alpha dist-tag, or a commit SHA from source."
      placeholder: "0.7.3-alpha.1"
    validations:
      required: true
  - type: dropdown
    id: install-method
    attributes:
      label: Install method
      options:
        - "pnpm add @agentclutch/*@alpha"
        - "pnpm dlx @agentclutch/cli@alpha"
        - "source checkout"
        - "packed tarball"
        - "other"
    validations:
      required: true
  - type: textarea
    id: summary
    attributes:
      label: What happened?
      description: A concise description of the bug.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction steps
      description: Keep this as small as possible.
      placeholder: |
        1. Run ...
        2. Click ...
        3. See ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior or output
      description: Paste terminal output or screenshots if helpful. Redact secrets and private data.
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      value: |
        - OS:
        - Node version:
        - pnpm version:
        - Browser/Playwright version, if relevant:
    validations:
      required: true
  - type: textarea
    id: extra
    attributes:
      label: Additional context
      description: Links, screenshots, logs, or notes. Please redact sensitive data.
    validations:
      required: false
